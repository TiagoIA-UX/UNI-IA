<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="unicornGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a2be2" />
      <stop offset="50%" stop-color="#00b0ff" />
      <stop offset="100%" stop-color="#00e676" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fundo Hexagonal Base -->
  <path d="M256 32 L448 128 L448 384 L256 480 L64 384 L64 128 Z" fill="#0b0e14" stroke="#1c2536" stroke-width="12"/>
  
  <!-- Trend / Chifre do Unicórnio (Candlestick) -->
  <rect x="248" y="100" width="16" height="180" fill="#00e676" filter="url(#glow)"/>
  <polygon points="256,60 220,130 292,130" fill="url(#unicornGrad)" filter="url(#glow)"/>
  
  <!-- Perfil Geométrico da Cabeça do Unicórnio -->
  <path d="M256 160 L140 280 L180 380 L256 320 L332 380 L372 280 Z" fill="none" stroke="url(#unicornGrad)" stroke-width="28" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Olho (Nó de Rede/IA) -->
  <circle cx="200" cy="240" r="16" fill="#00e676" filter="url(#glow)"/>
  <circle cx="312" cy="240" r="16" fill="#00e676" opacity="0.4"/>
  
  <!-- Conexões Neurais Geométricas -->
  <line x1="256" y1="320" x2="256" y2="440" stroke="#00b0ff" stroke-width="12" filter="url(#glow)"/>
  <circle cx="256" cy="440" r="10" fill="#8a2be2" filter="url(#glow)"/>
</svg>